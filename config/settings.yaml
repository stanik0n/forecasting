paths:
  raw_data: data/raw
  interim_data: data/interim
  processed_data: data/processed
  outputs_tables: outputs/tables
  outputs_charts: outputs/charts
  outputs_models: outputs/models

data:
  # Pilot scope: filter to one store for fast iteration. Set to null to use all.
  pilot_store: CA_1
  # Set to null to use all categories
  pilot_category: null
  # Last N days of training data to use (null = all). Set to 730 for full-store runs to manage memory.
  max_train_days: null

forecast:
  horizon_days: 28
  # Number of days before forecast horizon to use as validation window
  validation_days: 28
  # Lag features (days)
  lag_days: [1, 2, 7, 14, 28]
  # Rolling window sizes (days)
  rolling_windows: [7, 28, 56]

replenishment:
  lead_time_days: 7
  # Safety stock multiplier (z-score). 1.65 = ~95% service level
  service_level_z: 1.65
  # Target days of coverage for order-up-to level
  target_days_coverage: 14
  # Starting inventory (units) for simulation - if null, uses 2x reorder point
  initial_inventory: null

model:
  lgbm:
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    min_child_samples: 50
    subsample: 0.7
    colsample_bytree: 0.7
    random_state: 42
    n_jobs: -1
